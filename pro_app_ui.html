<!DOCTYPE html>
<html>
<head>
<title>Pro App UI - Nazmul</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0d1117;
  color:white;
}

/* TOP BAR */
.topbar{
  background:#161b22;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:16px;
  border-bottom:1px solid #30363d;
}

.topbar span{
  cursor:pointer;
}

/* FEED */
.feed{
  padding:15px;
  padding-bottom:80px;
}

.card{
  background:#21262d;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

/* PROFILE HEADER */
.profile{
  display:flex;
  align-items:center;
  margin-bottom:10px;
}

.profile img{
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

/* ACTION BUTTON */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.actions span{
  cursor:pointer;
  transition:0.3s;
}

.actions span:hover{
  color:#58a6ff;
}

/* GRAPH */
.graph{
  margin:15px;
  padding:20px;
  text-align:center;
  border-radius:12px;
  background:linear-gradient(45deg,#1f2937,#111);
  box-shadow:0 0 20px rgba(88,166,255,0.3);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #58a6ff;}
  to{box-shadow:0 0 25px #58a6ff;}
}

/* STAR BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity:0.2;
  z-index:-1;
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#161b22;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #30363d;
}

.bottom span{
  font-size:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.bottom span:hover{
  color:#58a6ff;
}
</style>

</head>

<body>

<div class="topbar">
<span>⚙️</span>
<b>Nazmul App</b>
<div>
<span>🔍</span>
<span>🔐</span>
</div>
</div>

<div class="feed">

<div class="card">

<div class="profile">
<img src="https://i.pravatar.cc/100">
<b>User Name</b>
</div>

<h3>📰 News Feed</h3>
<p>এখানে ভিডিও / পোস্ট দেখাবে 🔥</p>

<div class="actions">
<span>❤️ Like</span>
<span>💬 Comment</span>
<span>🔄 Remix</span>
<span>📤 Share</span>
</div>

</div>

</div>

<div class="graph">
📊 Smart Activity Graph System
</div>

<div class="bottom">
<span>🏠<br>Home</span>
<span>➕<br>Create</span>
<span>👥<br>Friends</span>
<span>⬆️<br>Upload</span>
<span>💬<br>Inbox</span>
<span>👤<br>Profile</span>
</div>

</body>
</html>
